project:
  name: web-log-ai-detector
  mode: cli_batch_pipeline

input:
  default_server_type: apache

output:
  normalized_csv: outputs/normalized_logs.csv
  normalized_jsonl: outputs/normalized_logs.jsonl
  alerts_jsonl: outputs/alerts.jsonl
  report_markdown: outputs/report.md
  report_html: outputs/report.html

detection:
  enable_rule_detector: true
  enable_ml_detector: false

risk_scoring:
  low_threshold: 30
  medium_threshold: 70
  high_threshold: 100
